# ── Local Postgres for LangGraph checkpoint persistence ───────────────────────
#
# IMPORTANT: The postgres image major version (16) MUST match the intended
# Cloud SQL Postgres major version. When upgrading Cloud SQL, update this
# image pin to stay in lockstep — divergence causes schema incompatibilities.
#
# Usage:
#   docker compose up -d           # start (data survives via named volume)
#   docker compose down            # stop  (data preserved)
#   docker compose down -v         # stop and wipe all data
#   docker compose ps              # check health
#
# After first start, run the migration once:
#   poetry run init-checkpoints

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-eda}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eda}
      POSTGRES_DB: ${POSTGRES_DB:-eda_checkpoints}
    ports:
      - "5432:5432"
    volumes:
      - eda_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eda} -d ${POSTGRES_DB:-eda_checkpoints}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  eda_postgres_data:
